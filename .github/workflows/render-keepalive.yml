name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping Render health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
          PING_TIMEOUT: "30"
          RETRY_COUNT: "3"
          RETRY_DELAY: "10"
        run: sh scripts/render_keepalive.sh
